<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Nexaverse</title>
</head>
<body>

    <div class="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">Initializing Experience...</div>
    </div>

    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="grid-overlay">

    </div> 

    <div class="container">
        
        <!-- Header -->
        <div class="header" id="mainHeader">
            <div class="header-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00f0ff"/>
                            <stop offset="100%" style="stop-color:#ff00d4"/>
                        </linearGradient>
                    </defs>
                    <polygon points="50,5 95,30 95,70 50,95 5,70 5,30" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
                    <polygon points="50,20 80,37 80,63 50,80 20,63 20,37" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
                    <circle cx="50" cy="50" r="12" fill="url(#logoGradient)" opacity="0.3"/>
                    <circle cx="50" cy="50" r="6" fill="url(#logoGradient)"/>
                </svg>
            </div>
            <h1 class="header-brand-name">NEXAVERSE</h1>
            <p class="header-tagline">Digital Excellence Redefined</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu">
            <div class="menu-item initial-load" onclick="hidePageElements()" data-section="introduction">
                <div class="menu-item-badge">IN</div>
                <div class="menu-item-title">Introduction</div>
            </div>
            <div class="menu-item initial-load" data-section="services">
                <div class="menu-item-badge">SV</div>
                <div class="menu-item-title">Services</div>
            </div>
            <div class="menu-item initial-load" data-section="gallery">
                <div class="menu-item-badge">GL</div>
                <div class="menu-item-title">Gallery</div>
            </div>
            <div class="menu-item initial-load" data-section="testimonials">
                <div class="menu-item-badge">TM</div>
                <div class="menu-item-title">Testimonials</div>
            </div>
            <div class="menu-item initial-load" data-section="about">
                <div class="menu-item-badge">AB</div>
                <div class="menu-item-title">About</div>
            </div>
            <div class="menu-item initial-load" data-section="contact">
                <div class="menu-item-badge">CT</div>
                <div class="menu-item-title">Contact</div>
            </div>
        </div>
        
        <footer class="footer">

            <p>

                Designed by 
        
                <a href="https://templatemo.com" target="_blank">TemplateMo</a>
        
                & coded by
        
                <a href="https://www.facebook.com/profile.php?id=61560478782773" target="_blank">
                    Moaz Harfoush
                </a> 

            </p>

        </footer>

    </div>



    <script src="assets/js/main.js"></script>
</body>
</html>
